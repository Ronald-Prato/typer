<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Typocoin token</title>
  <desc id="desc">A glossy blue and green gradient circular token with a pale diamond shaped sparkle in the center.</desc>
  <defs>
    <radialGradient id="coinShadow" cx="47%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="68%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#031d3a" stop-opacity="0.24"/>
    </radialGradient>
    <linearGradient id="outerRim" x1="286" y1="271" x2="946" y2="971" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0088ff"/>
      <stop offset="22%" stop-color="#0aaaf7"/>
      <stop offset="48%" stop-color="#08c8cf"/>
      <stop offset="74%" stop-color="#17d876"/>
      <stop offset="100%" stop-color="#29e13f"/>
    </linearGradient>
    <linearGradient id="outerRimShade" x1="258" y1="225" x2="994" y2="1004" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="32%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="64%" stop-color="#003a84" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#006c28" stop-opacity="0.26"/>
    </linearGradient>
    <linearGradient id="face" x1="374" y1="351" x2="882" y2="883" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08a5ff"/>
      <stop offset="34%" stop-color="#08bedf"/>
      <stop offset="62%" stop-color="#0fcf98"/>
      <stop offset="100%" stop-color="#24dd44"/>
    </linearGradient>
    <radialGradient id="faceLight" cx="39%" cy="27%" r="74%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.36"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="groove" x1="367" y1="268" x2="878" y2="877" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#004ea5"/>
      <stop offset="45%" stop-color="#005c8b"/>
      <stop offset="100%" stop-color="#04763e"/>
    </linearGradient>
    <linearGradient id="glyph" x1="520" y1="367" x2="730" y2="796" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="48%" stop-color="#e4fff9"/>
      <stop offset="100%" stop-color="#b9f7df"/>
    </linearGradient>
    <linearGradient id="glyphEdge" x1="466" y1="430" x2="803" y2="778" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#9ffff0"/>
      <stop offset="100%" stop-color="#33b88c"/>
    </linearGradient>
    <filter id="softDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="13" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.24"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glyphShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"/>
      <feOffset dx="0" dy="12" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.32"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <g filter="url(#softDrop)">
    <circle cx="627" cy="627" r="441" fill="url(#outerRim)"/>
    <circle cx="627" cy="627" r="441" fill="url(#coinShadow)"/>
    <circle cx="627" cy="627" r="422" fill="none" stroke="#7df8ff" stroke-opacity="0.45" stroke-width="12"/>
    <path d="M244 595c20-191 182-340 379-340 143 0 268 79 334 196C877 346 752 281 613 293 436 309 294 446 270 620Z" fill="#ffffff" opacity="0.35" filter="url(#innerSoft)"/>

    <circle cx="627" cy="627" r="371" fill="none" stroke="url(#groove)" stroke-width="29" stroke-opacity="0.82"/>
    <circle cx="627" cy="627" r="343" fill="url(#face)"/>
    <circle cx="627" cy="627" r="343" fill="url(#faceLight)"/>
    <path d="M318 560c36-152 160-262 315-272 126-8 242 52 311 153-75-81-185-125-302-113-144 15-263 109-318 232Z" fill="#ffffff" opacity="0.2"/>
    <path d="M344 827c70 105 192 171 327 160 114-9 214-70 277-159-72 71-170 113-279 113-126 0-240-58-325-114Z" fill="#ffffff" opacity="0.16"/>
    <path d="M835 897c67-41 117-103 144-176" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-opacity="0.7" stroke-width="14"/>
    <path d="M272 429c67-100 174-164 294-178" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-opacity="0.72" stroke-width="16"/>
    <circle cx="627" cy="627" r="343" fill="none" stroke="url(#outerRimShade)" stroke-width="22" opacity="0.7"/>
  </g>

  <g filter="url(#glyphShadow)">
    <path d="M627 403C674 526 729 581 852 627 729 674 674 729 627 852 580 729 525 674 402 627 525 581 580 526 627 403Z" fill="#078c8b" opacity="0.4" transform="translate(0 16)"/>
    <path d="M627 391C677 521 733 577 863 627 733 677 677 733 627 863 577 733 521 677 391 627 521 577 577 521 627 391Z" fill="url(#glyph)" stroke="url(#glyphEdge)" stroke-width="14" stroke-linejoin="round"/>
    <path d="M627 456C661 532 722 592 798 627 722 662 661 722 627 798 592 722 532 662 456 627 532 592 592 532 627 456Z" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="5" stroke-linejoin="round"/>
    <path d="M461 611c67-25 116-75 149-154" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-opacity="0.76" stroke-width="10"/>
  </g>
</svg>
